# ===== ccv dynamic-port reverse proxy =====
# 子域 ccv-<port>.xiaoyuervae.cn → 192.168.3.250:<port>
# 复用 *.xiaoyuervae.cn 通配符证书 (npm-52)

map $http_upgrade $ccv_conn_upgrade {
    default upgrade;
    ''      close;
}

map $ccv_port $ccv_port_ok {
    default          0;
    "~^70[0-9]{2}$"  1;   # 仅放 ccv 默认范围 7000-7099
}

server {
    listen 4443 ssl http2;
    listen [::]:4443 ssl http2;

    server_name "~^ccv-(?<ccv_port>\d{4})\.xiaoyuervae\.cn$";

    include conf.d/include/ssl-cache.conf;
    include conf.d/include/ssl-ciphers.conf;
    ssl_certificate     /etc/letsencrypt/live/npm-52/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npm-52/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=30s;
    resolver_timeout 5s;

    if ($ccv_port_ok = 0) { return 444; }


    client_max_body_size 100m;
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;

    # SSE / WebSocket 必须关 buffering
    proxy_buffering off;
    proxy_cache     off;

    access_log /data/logs/ccv_access.log proxy;
    error_log  /data/logs/ccv_error.log warn;

    location / {
        # 必须走 192.168.3.250 而不是 127.0.0.1，避免触发 ccv 本机免鉴权
        set $ccv_upstream 192.168.3.250:$ccv_port;
        proxy_pass http://$ccv_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  9990;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $ccv_conn_upgrade;
    }
}

# ===== ccv hub fixed subdomain =====
# ccv.xiaoyuervae.cn → 192.168.3.250:7100 (launcher hub)
server {
    listen 4443 ssl http2;
    listen [::]:4443 ssl http2;
    server_name ccv.xiaoyuervae.cn;

    include conf.d/include/ssl-cache.conf;
    include conf.d/include/ssl-ciphers.conf;
    ssl_certificate     /etc/letsencrypt/live/npm-52/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/npm-52/privkey.pem;

    resolver 127.0.0.11 ipv6=off valid=30s;

    auth_basic           "ccv-hub";
    auth_basic_user_file /data/nginx/custom/ccv.htpasswd;

    client_max_body_size 100m;
    proxy_read_timeout   3600s;
    proxy_send_timeout   3600s;
    proxy_buffering off;
    proxy_cache     off;

    access_log /data/logs/ccv_hub_access.log proxy;
    error_log  /data/logs/ccv_hub_error.log warn;

    location / {
        proxy_pass http://192.168.3.250:7100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  9990;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $ccv_conn_upgrade;
    }
}
